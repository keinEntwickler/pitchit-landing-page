features:
  - title: "Partite rapide"
    description: "Ascolta un tono, scegli la nota, feedback immediato. Anche quando sbagli impari, grazie alla riproduzione audio chiara."
    icon: "bolt"
  - title: "Tre modalità"
    description: "Nota singola, Accordi e Ordine tonale. Dall'apprendimento rilassato alle sfide a tempo."
    icon: "music"
  - title: "Modalità Blitz"
    description: "Timer di 5 secondi, punti doppi. Aggiungi una sfida a tempo a qualsiasi modalità di gioco."
    icon: "rocket"
  - title: "33 strumenti"
    description: "Allenati con Pianoforte, Chitarra, Archi, Ottoni, Legni e altro. Sblocca nuovi suoni per sfidare il tuo orecchio."
    icon: "headphones"
  - title: "Progresso reale"
    description: "Segui precisione, serie e progressione di difficoltà. Guarda crescere il tuo orecchio musicale."
    icon: "chart-line"
  - title: "Privacy al primo posto"
    description: "Niente pubblicità. Niente tracciamento. Nessun account. I tuoi progressi si sincronizzano in privato tramite iCloud."
    icon: "shield-alt"
