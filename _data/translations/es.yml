features:
  - title: "Rondas cortas"
    description: "Escucha un tono, elige la nota, respuesta inmediata. Si fallas, también aprendes gracias a la repetición de audio clara."
    icon: "bolt"
  - title: "Tres modos de juego"
    description: "Nota única, Acordes y Orden tonal. Del aprendizaje relajado a los desafíos contrarreloj."
    icon: "music"
  - title: "Modo Blitz"
    description: "Timer de 5 segundos, puntos dobles. Añade un desafío contrarreloj a cualquier modo de juego."
    icon: "rocket"
  - title: "33 instrumentos"
    description: "Entrena con Piano, Guitarra, Cuerdas, Metales, Viento madera y más. Desbloquea nuevos sonidos."
    icon: "headphones"
  - title: "Progreso real"
    description: "Sigue tu precisión, rachas y progresión de dificultad. Observa cómo mejora tu oído musical."
    icon: "chart-line"
  - title: "Privacidad por defecto"
    description: "Sin anuncios. Sin rastreo. Sin cuenta. Tu progreso se sincroniza de forma privada con iCloud."
    icon: "shield-alt"
