lang: de
lang_name: Deutsch
tagline: "Trainiere dein Gehör. Ton für Ton."
description: "Höre einen Ton, wähle die richtige Note und verbessere dein Gehör Runde für Runde."
keywords: "gehör,training,musik,noten,tonhöhe,spiel,quiz,audio,ton,instrument,akkord,klang"
app_store_button: "Im App Store laden"
features:
  - title: "Kurze Runden"
    description: "Höre einen Ton, wähle die Note, sofortiges Feedback. Auch falsche Antworten helfen dank klarer Audio-Wiederholung."
    icon: "bolt"
  - title: "Drei Spielmodi"
    description: "Einzelton, Akkorde und Tonhöhenfolge. Von entspanntem Lernen bis zu schnellen Highscore-Jagden."
    icon: "music"
  - title: "Blitz-Modus"
    description: "5-Sekunden-Timer, doppelte Punkte. Füge jedem Spielmodus eine zeitliche Herausforderung hinzu."
    icon: "rocket"
  - title: "33 Instrumente"
    description: "Trainiere mit Klavier, Gitarre, Streicher, Blechbläser, Holzbläser und mehr. Schalte neue Klänge frei."
    icon: "headphones"
  - title: "Fortschritt verfolgen"
    description: "Verfolge deine Genauigkeit, Streaks und Schwierigkeitsstufen. Sieh zu, wie sich dein Gehör verbessert."
    icon: "chart-line"
  - title: "Datenschutz an erster Stelle"
    description: "Keine Werbung. Kein Tracking. Kein Konto nötig. Dein Fortschritt wird privat über iCloud synchronisiert."
    icon: "shield-alt"
