tagline: "Allena il tuo orecchio. Una nota alla volta."
description: "Ascolta un tono, scegli la nota giusta e migliora il tuo orecchio partita dopo partita."
keywords: "orecchio,allenamento,musica,note,intonazione,gioco,quiz,audio,tono,strumento,accordo,suono"
