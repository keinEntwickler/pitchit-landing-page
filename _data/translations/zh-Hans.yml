tagline: "训练你的耳朵，从一个音符开始。"
description: "听到一个音，选出对应的音符。一局比一局更准，循序渐进提升你的音感与听力。"
keywords: "耳朵,训练,音乐,音符,音高,游戏,答题,音频,音调,乐器,和弦,声音"
app_store_button: "在 App Store 下载"
features:
  - title: "快速对局"
    description: "听一个音，选出正确的音符。即时反馈，马上再来一局。答错也没关系，清晰音频回放帮你稳步提升。"
    icon: "bolt"
  - title: "三种模式"
    description: "单音、和弦、音高排序。从轻松入门到高难挑战，总有一种节奏适合你。"
    icon: "music"
  - title: "闪电模式"
    description: "5秒计时，双倍积分。为任意模式增加限时挑战，快节奏训练你的耳朵。"
    icon: "rocket"
  - title: "33 种乐器"
    description: "钢琴、吉他、弦乐、铜管、木管等。解锁更多音色，挑战你的听觉极限。"
    icon: "headphones"
  - title: "看得见的成长"
    description: "准确率、连胜记录、难度进阶全程追踪。每一局都有进步，你的音感正在变强。"
    icon: "chart-line"
  - title: "隐私优先"
    description: "无广告，无跟踪，无需注册。进度通过 iCloud 私密同步，安心使用。"
    icon: "shield-alt"
