tagline: "Entrena tu oído. Un tono a la vez."
description: "Escucha un tono, elige la nota correcta y mejora tu oído ronda a ronda."
keywords: "oído,entrenamiento,música,notas,tono,juego,quiz,audio,instrumento,acorde,sonido"
